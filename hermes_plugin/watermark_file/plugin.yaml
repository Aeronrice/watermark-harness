name: watermark-file
version: 1.0.4
description: "Agent tool for applying locked-standard repeated diagonal watermarks to local PDF, image, Word, Excel, and PPT files without overwriting originals. Office inputs are converted to watermarked PDF output."
author: local
kind: standalone
provides_tools:
  - watermark_file
pip_dependencies:
  - pillow>=10,<13
  - pypdf>=6.14.2,<7
  - reportlab>=5.0.0,<6
